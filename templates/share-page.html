<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Джули · Новая страница</title>
  <style>
    :root {
      --bg: #f5f6f2;
      --surface: #ffffff;
      --ink: #20231f;
      --muted: #687064;
      --line: #d9ded6;
      --green: #2e7b55;
      --blue: #2f6488;
      --shadow: 0 14px 30px rgba(31, 38, 28, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      letter-spacing: 0;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .topbar,
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      min-height: 76px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #e7efe8;
      color: var(--green);
      font-weight: 850;
    }

    h1, h2, p { margin: 0; }
    h1 { font-size: 20px; line-height: 1.2; }
    h2 { font-size: 17px; }

    main {
      display: grid;
      gap: 14px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      gap: 10px;
    }

    .muted {
      color: var(--muted);
      line-height: 1.45;
    }

    .pill {
      width: fit-content;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 8px;
      color: #fff;
      background: var(--blue);
      font-size: 12px;
      font-weight: 760;
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="mark">J</div>
      <div>
        <h1>Название страницы</h1>
        <p class="muted">короткое объяснение для внешнего человека</p>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <span class="pill">статус</span>
      <h2>Главная мысль</h2>
      <p class="muted">Текст страницы. Перед публикацией убрать личные данные, внутренние ссылки, черновые задачи и всё, что не должно жить в интернете.</p>
    </section>
  </main>
</body>
</html>
